<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativo de Minimapas por Voz</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 15px;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
        }
        #status { font-weight: bold; color: #555; margin-bottom: 15px; }
        #painel { font-size: 18px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        
        /* Grid para alinhar os mapas lado a lado no PC e empilhados no celular */
        .mapas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .mapa-box {
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .mapa-janela {
            height: 250px;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            background-color: #e5e3df;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Guia de Ruas por Voz</h1>
        <button id="btnIniciar">Iniciar Monitoramento</button>
        
        <div id="status">Status: Parado</div>
        
        <div id="painel">
            <p><strong>Rua/Local:</strong> <span id="rua">-</span></p>
            <p><strong>Bairro:</strong> <span id="bairro">-</span></p>
        </div>

        <h3>Compare as Tecnologias e Camadas:</h3>
        <div class="mapas-grid">
            
            <div class="mapa-box">
                <strong>1. Leaflet.js (Mapa Tradicional)</strong>
                <div id="mapaLeaflet" class="mapa-janela"></div>
            </div>
            
            <div class="mapa-box">
                <strong>2. OpenLayers (Visão Satélite)</strong>
                <div id="mapaOpenLayers" class="mapa-janela"></div>
            </div>
            
            <div class="mapa-box">
                <strong>3. MapLibre GL (Modo Noturno)</strong>
                <div id="mapaMapLibre" class="mapa-janela"></div>
            </div>
            
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <script>
        const btnIniciar = document.getElementById('btnIniciar');
        const statusDiv = document.getElementById('status');
        const ruaSpan = document.getElementById('rua');
        const bairroSpan = document.getElementById('bairro');

        let ultimaRuaFalada = "";
        let watchId = null;
        
        // Instâncias dos mapas, marcadores e fontes
        let mapL = null, markerL = null;
        let mapOL = null, featureOL = null, sourceOL = null;
        let mapML = null, markerML = null;

        function inicializarMapas() {
            const centroInicial = [0, 0];

            // --- 1. CONFIGURAÇÃO LEAFLET (Mapa Padrão) ---
            if (mapL === null) {
                mapL = L.map('mapaLeaflet').setView(centroInicial, 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OSM'
                }).addTo(mapL);
                markerL = L.marker(centroInicial).addTo(mapL);
            }

            // --- 2. CONFIGURAÇÃO OPENLAYERS (Camada Satélite da Esri) ---
            if (mapOL === null) {
                // Fonte para o marcador vetorial
                sourceOL = new ol.source.Vector();
                featureOL = new ol.Feature(new ol.geom.Point(ol.proj.fromLonLat([0, 0])));
                sourceOL.addFeature(featureOL);

                mapOL = new ol.Map({
                    target: 'mapaOpenLayers',
                    layers: [
                        // Camada de Satélite Mundial da ESRI
                        new ol.layer.Tile({
                            source: new ol.source.XYZ({
                                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                                attribution: 'Tiles © Esri'
                            })
                        }),
                        // Camada do marcador por cima do satélite
                        new ol.layer.Vector({
                            source: sourceOL,
                            style: new ol.style.Style({
                                image: new ol.style.Icon({
                                    src: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                                    anchor: [0.5, 1]
                                })
                            })
                        })
                    ],
                    view: new ol.View({
                        center: ol.proj.fromLonLat([0, 0]),
                        zoom: 16
                    })
                });
            }

            // --- 3. CONFIGURAÇÃO MAPLIBRE GL JS (Modo Noturno do CartoDB) ---
            if (mapML === null) {
                mapML = new maplibregl.Map({
                    container: 'mapaMapLibre',
                    // Estilo em formato JSON para o Modo Noturno (CartoDB Dark Matter)
                    style: {
                        version: 8,
                        sources: {
                            'raster-tiles': {
                                type: 'raster',
                                tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
                                tileSize: 256,
                                attribution: '© CartoDB'
                            }
                        },
                        layers: [{
                            id: 'simple-tiles',
                            type: 'raster',
                            source: 'raster-tiles',
                            minzoom: 0,
                            maxzoom: 18
                        }]
                    },
                    center: centroInicial,
                    zoom: 15
                });
                markerML = new maplibregl.Marker().setLngLat(centroInicial).addTo(mapML);
            }
        }

        btnIniciar.addEventListener('click', () => {
            if (watchId === null) {
                inicializarMapas();
                iniciarMonitoramento();
            } else {
                pararMonitoramento();
            }
        });

        function iniciarMonitoramento() {
            if (!("geolocation" in navigator)) {
                alert("Seu navegador não suporta Geolocalização.");
                return;
            }
            statusDiv.innerText = "Status: Buscando sinal GPS...";
            btnIniciar.innerText = "Parar Monitoramento";
            btnIniciar.style.backgroundColor = "#dc3545";

            watchId = navigator.geolocation.watchPosition(posicionarSucesso, posicionarErro, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        }

        function pararMonitoramento() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                statusDiv.innerText = "Status: Parado";
                btnIniciar.innerText = "Iniciar Monitoramento";
                btnIniciar.style.backgroundColor = "#007bff";
            }
        }

        async function posicionarSucesso(posicao) {
            const lat = posicao.coords.latitude;
            const lon = posicao.coords.longitude;
            statusDiv.innerText = `Status: Conectado (${lat.toFixed(4)}, ${lon.toFixed(4)})`;

            // --- ATUALIZAR LEAFLET ---
            if (mapL) {
                mapL.setView([lat, lon], 17);
                markerL.setLatLng([lat, lon]);
            }

            // --- ATUALIZAR OPENLAYERS ---
            if (mapOL) {
                const coordenadasOL = ol.proj.fromLonLat([lon, lat]);
                mapOL.getView().setCenter(coordenadasOL);
                mapOL.getView().setZoom(17);
                featureOL.getGeometry().setCoordinates(coordenadasOL);
            }

            // --- ATUALIZAR MAPLIBRE GL ---
            if (mapML) {
                mapML.setCenter([lon, lat]);
                mapML.setZoom(16);
                markerML.setLngLat([lon, lat]);
            }

            // --- BUSCA DO ENDEREÇO E RETORNO DE VOZ ---
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;
                const resposta = await fetch(url, { headers: { 'User-Agent': 'IdentificadorDeRuasApp/1.0' } });
                const dados = await resposta.json();

                if (dados && dados.address) {
                    const ruaAtual = dados.address.road || dados.address.pedestrian || dados.address.amenity || dados.address.industrial || "Área interna / Local particular";
                    const bairroAtual = dados.address.suburb || dados.address.neighbourhood || dados.address.city_district || "Bairro não identificado";

                    ruaSpan.innerText = ruaAtual;
                    bairroSpan.innerText = bairroAtual;

                    if (ruaAtual !== ultimaRuaFalada) {
                        falarTexto(`Você está em: ${ruaAtual}, bairro ${bairroAtual}`);
                        ultimaRuaFalada = ruaAtual;
                    }
                }
            } catch (erro) {
                console.error(erro);
            }
        }

        function posicionarErro(erro) {
            statusDiv.innerText = "Status: Erro ao obter GPS";
        }

        function falarTexto(texto) {
            window.speechSynthesis.cancel();
            const mensagem = new SpeechSynthesisUtterance(texto);
            mensagem.lang = 'pt-BR';
            mensagem.rate = 1.1;
            window.speechSynthesis.speak(mensagem);
        }
    </script>
</body>
</html>
