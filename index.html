<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Ruas por Voz - MapLibre Estabilizado</title>
    
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 15px;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button#btnIniciar {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            font-weight: bold;
        }
        #status { font-weight: bold; color: #555; margin-bottom: 15px; }
        #painel { font-size: 18px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        
        .mapa-container {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        #mapa {
            width: 100%;
            height: 100%;
            background-color: #e5e3df;
        }

        #btnControleInferior {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s ease;
        }
        .btn-branco { background-color: white; }
        .btn-branco svg { fill: #3c4043; width: 26px; height: 26px; }
        
        .btn-azul-clicado { background-color: #e8f0fe; }
        .btn-azul-clicado svg { fill: #1a73e8; width: 26px; height: 26px; }

        #btnAgulhaNorte {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background-color: white;
            border-radius: 50%;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.6);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }
        #btnAgulhaNorte.visivel {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .agulha-bussola {
            width: 14px;
            height: 28px;
            position: relative;
        }
        .agulha-bussola::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid #ea4335;
        }
        .agulha-bussola::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 14px solid #bcc1c6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Guia de Ruas por Voz</h1>
        <button id="btnIniciar">Iniciar Navegação</button>
        
        <div id="status">Status: Parado</div>
        
        <div id="painel">
            <p><strong>Rua/Local:</strong> <span id="rua">-</span></p>
            <p><strong>Bairro:</strong> <span id="bairro">-</span></p>
        </div>

        <div class="mapa-container">
            <button id="btnAgulhaNorte" title="Recentralizar Norte">
                <div class="agulha-bussola"></div>
            </button>

            <button id="btnControleInferior" class="btn-branco" title="Orientação">
                <svg id="svgIcone" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13l-3 8 4-2 4 2-5-8z"/>
                </svg>
            </button>

            <div id="mapa"></div>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <script>
        const btnIniciar = document.getElementById('btnIniciar');
        const btnControleInferior = document.getElementById('btnControleInferior');
        const btnAgulhaNorte = document.getElementById('btnAgulhaNorte');
        const svgIcone = document.getElementById('svgIcone');
        
        const statusDiv = document.getElementById('status');
        const ruaSpan = document.getElementById('rua');
        const bairroSpan = document.getElementById('bairro');

        let ultimaRuaFalada = "";
        let watchId = null;
        let latAtual = -3.6895, lonAtual = -40.3490; // Sobral
        
        let map = null;
        let marker = null;
        
        let modoAtual = "BUSSOLA_DESATIVADA"; 
        let autoCentralizar = true;
        let travaMovimentoAutomatica = false;

        // VARIÁVEIS DO FILTRO DA BÚSSOLA
        let anguloFiltrado = 0; 
        const fatorSuavizacao = 0.02; // Filtro amortecedor para estabilizar a moto
        const zonaMortaGraus = 4.0; 

        const svgBussola = "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13l-3 8 4-2 4 2-5-8z";
        const svgAlvo = "M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm10 3h-2.07c-.45-4.22-3.78-7.55-8-8V1c-.55 0-1 .45-1 1v2.07c-4.22.45-7.55 3.78-8 8H1c-.55 0-1 .45-1 1s.45 1 1 1h2.07c.45 4.22 3.78 7.55 8 8V23c0 .55.45 1 1 1s1-.45 1-1v-2.07c4.22-.45 7.55-3.78 8-8H23c.55 0 1-.45 1-1s-.45-1-1-1zm-10 10c-4.97 0-9-4.03-9-9s4.03-9 9-9 9 4.03 9 9-4.03 9-9 9z";

        const estiloCyclOSM = {
            version: 8,
            sources: { 'cyclosm-tiles': { type: 'raster', tiles: ['https://a.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png'], tileSize: 256 } },
            layers: [{ id: 'cyclosm-layer', type: 'raster', source: 'cyclosm-tiles' }]
        };

        function inicializarMapa() {
            if (map !== null) return;

            map = new maplibregl.Map({
                container: 'mapa',
                style: estiloCyclOSM,
                center: [lonAtual, latAtual],
                zoom: 15,
                pitch: 0,
                bearing: 0
            });

            marker = new maplibregl.Marker().setLngLat([lonAtual, latAtual]).addTo(map);

            const dispararModoAlvoPorGesto = () => {
                if (travaMovimentoAutomatica) return;
                
                if (modoAtual !== "MODO_ALVO") {
                    modoAtual = "MODO_ALVO";
                    autoCentralizar = false;
                    
                    btnControleInferior.className = "btn-branco";
                    svgIcone.innerHTML = `<path d="${svgAlvo}"/>`;
                }
            };

            map.on('dragstart', dispararModoAlvoPorGesto);
            map.on('zoomstart', dispararModoAlvoPorGesto);

            map.on('rotate', gerenciarAgulha);
            map.on('pitch', gerenciarAgulha);
        }

        function gerenciarAgulha() {
            if (!map) return;
            const angulo = map.getBearing();
            const inclinacao = map.getPitch();

            if (Math.abs(angulo) > 1 || inclinacao > 1) {
                btnAgulhaNorte.classList.add('visivel');
                btnAgulhaNorte.style.transform = `rotate(${-angulo}deg)`;
            } else {
                btnAgulhaNorte.classList.remove('visivel');
            }
        }

        btnControleInferior.addEventListener('click', () => {
            if (!map) return;

            if (modoAtual === "MODO_ALVO") {
                modoAtual = "BUSSOLA_DESATIVADA";
                autoCentralizar = true;
                travaMovimentoAutomatica = true;
                
                btnControleInferior.className = "btn-branco";
                svgIcone.innerHTML = `<path d="${svgBussola}"/>`;

                map.flyTo({
                    center: [lonAtual, latAtual],
                    zoom: 15,
                    pitch: 0,
                    bearing: 0,
                    essential: true
                });
                
                map.once('moveend', () => { travaMovimentoAutomatica = false; });

            } else if (modoAtual === "BUSSOLA_DESATIVADA") {
                modoAtual = "BUSSOLA_ATIVADA";
                autoCentralizar = true;
                travaMovimentoAutomatica = true;
                
                btnControleInferior.className = "btn-azul-clicado";
                anguloFiltrado = -map.getBearing();

                map.flyTo({
                    center: [lonAtual, latAtual],
                    zoom: 17.5,
                    pitch: 55,
                    essential: true
                });
                
                map.once('moveend', () => { travaMovimentoAutomatica = false; });

            } else if (modoAtual === "BUSSOLA_ATIVADA") {
                modoAtual = "BUSSOLA_DESATIVADA";
                autoCentralizar = true;
                travaMovimentoAutomatica = true;
                
                btnControleInferior.className = "btn-branco";

                map.flyTo({
                    center: [lonAtual, latAtual],
                    zoom: 15,
                    pitch: 0,
                    bearing: 0,
                    essential: true
                });
                
                map.once('moveend', () => { travaMovimentoAutomatica = false; });
            }
        });

        btnAgulhaNorte.addEventListener('click', () => {
            if (!map) return;
            
            if (modoAtual === "BUSSOLA_ATIVADA") {
                modoAtual = "BUSSOLA_DESATIVADA";
                btnControleInferior.className = "btn-branco";
            }

            travaMovimentoAutomatica = true;
            map.easeTo({
                bearing: 0,
                pitch: 0,
                duration: 500
            });
            map.once('moveend', () => { travaMovimentoAutomatica = false; });
        });

        // ESCUTADOR DA BÚSSOLA CORRIGIDO E SUAVIZADO
        window.addEventListener('deviceorientationabsolute', tratarOrientacao, true);
        window.addEventListener('deviceorientation', tratarOrientacao, true);

        // ====== EVENTO DA BÚSSOLA CORRIGIDO ESTILO GOOGLE MAPS ======
window.addEventListener('deviceorientationabsolute', tratarOrientacao, true);
window.addEventListener('deviceorientation', tratarOrientacao, true);

let ultimoAzimuteValido = null;

function tratarOrientacao(evento) {
    if (!map || modoAtual !== "BUSSOLA_ATIVADA" || !autoCentralizar || travaMovimentoAutomatica) return;

    // 1. Captura o azimute (Rumo ao Norte)
    let azimuteBruto = evento.webkitCompassHeading || (360 - evento.alpha);
    if (azimuteBruto === undefined || azimuteBruto === null) return;

    // Se for a primeira leitura, calibra o filtro instantaneamente
    if (ultimoAzimuteValido === null) {
        anguloFiltrado = azimuteBruto;
        ultimoAzimuteValido = azimuteBruto;
        return;
    }

    // 2. Correção de quebra de 0° / 360°
    let diferenca = azimuteBruto - anguloFiltrado;
    if (diferenca > 180) {
        anguloFiltrado += 360;
    } else if (diferenca < -180) {
        anguloFiltrado -= 360;
    }

    // 3. TRAVA ANTIFANTASMA (Simula o comportamento parado do Google Maps)
    // Calcula a variação imediata do sensor
    let variacaoImediata = Math.abs(azimuteBruto - ultimoAzimuteValido);
    ultimoAzimuteValido = azimuteBruto;

    // Se o celular estiver praticamente parado (variação menor que 1.2 graus por disparo), 
    // nós aumentamos drasticamente o amortecimento para congelar os movimentos fantasmas.
    let amortecimentoDinamico = fatorSuavizacao; // 0.02
    if (variacaoImediata < 3.2) {
        amortecimentoDinamico = 0.001; // Quase congela o mapa se o celular estiver parado
    }

    // 4. Aplica o filtro amortecedor
    anguloFiltrado = anguloFiltrado + amortecimentoDinamico * (azimuteBruto - anguloFiltrado);

    // 5. INVERSÃO DE SENTIDO (Ajuste do referencial para o mundo real)
    // O Google Maps fixa o mundo. Para o MapLibre fixar o mundo real, passamos o valor 
    // direto do azimute positivo (ou ajustado), sem o sinal de menos que causava o efeito espelho.
    let rumoCorretoMapa = anguloFiltrado; 

    map.easeTo({
        bearing: rumoCorretoMapa,
        duration: 20, // Resposta rápida para acompanhar o movimento real
        easing: (t) => t
    });
}


        // GPS MONITORAMENTO
        btnIniciar.addEventListener('click', () => {
            if (watchId === null) {
                inicializarMapa();
                iniciarMonitoramento();
            } else {
                pararMonitoramento();
            }
        });

        function iniciarMonitoramento() {
            if (!("geolocation" in navigator)) { return alert("GPS indisponível."); }
            statusDiv.innerText = "Status: Conectando...";
            btnIniciar.innerText = "Parar Rastreamento";
            btnIniciar.style.backgroundColor = "#dc3545";

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(e => console.log(e));
            }

            watchId = navigator.geolocation.watchPosition(posicionarSucesso, posicionarErro, {
                enableHighAccuracy: true, maximumAge: 0, timeout: 10000
            });
        }

        function pararMonitoramento() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                statusDiv.innerText = "Status: Parado";
                btnIniciar.innerText = "Iniciar Navegação";
                btnIniciar.style.backgroundColor = "#28a745";
            }
        }

        async function posicionarSucesso(posicao) {
            latAtual = posicao.coords.latitude;
            lonAtual = posicao.coords.longitude;
            statusDiv.innerText = `Status: Conectado (${latAtual.toFixed(4)}, ${lonAtual.toFixed(4)})`;

            if (marker) marker.setLngLat([lonAtual, latAtual]);

            if (map && autoCentralizar && !travaMovimentoAutomatica) {
                map.easeTo({
                    center: [lonAtual, latAtual],
                    duration: 500
                });
            }

            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latAtual}&lon=${lonAtual}&zoom=18&addressdetails=1`;
                const resposta = await fetch(url, { headers: { 'User-Agent': 'IdentificadorDeRuasApp/1.0' } });
                const dados = await resposta.json();

                if (dados && dados.address) {
                    const ruaAtual = dados.address.road || dados.address.pedestrian || "Via urbana";
                    const bairroAtual = dados.address.suburb || "Sobral";

                    ruaSpan.innerText = ruaAtual;
                    bairroSpan.innerText = bairroAtual;

                    if (ruaAtual !== ultimaRuaFalada) {
                        falarTexto(`Você está na rua: ${ruaAtual}`);
                        ultimaRuaFalada = ruaAtual;
                    }
                }
            } catch (e) {}
        }

        function posicionarErro(e) { statusDiv.innerText = "Status: Sem sinal GPS"; }
        function falarTexto(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'pt-BR'; m.rate = 1.1; window.speechSynthesis.speak(m); }
    </script>
</body>
</html>
