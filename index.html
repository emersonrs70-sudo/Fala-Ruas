<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Ruas por Voz - MapLibre Estabilizado</title>
    
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 15px;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button#btnIniciar {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            font-weight: bold;
        }
        #status { font-weight: bold; color: #555; margin-bottom: 15px; }
        #painel { font-size: 18px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        
        .mapa-container {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        #mapa {
            width: 100%;
            height: 100%;
            background-color: #e5e3df;
        }

        #btnControleInferior {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0;
            background: none;
        }
        
        #btnControleInferior svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        #btnAgulhaNorte {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background-color: white;
            border-radius: 50%;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.6);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }
        #btnAgulhaNorte.visivel {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .agulha-bussola {
            width: 14px;
            height: 28px;
            position: relative;
        }
        .agulha-bussola::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid #ea4335;
        }
        .agulha-bussola::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 14px solid #bcc1c6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Guia de Ruas por Voz</h1>
        <button id="btnIniciar">Iniciar Navegação</button>
        
        <div id="status">Status: Parado</div>
        
        <div id="painel">
            <p><strong>Rua/Local:</strong> <span id="rua">-</span></p>
            <p><strong>Bairro:</strong> <span id="bairro">-</span></p>
        </div>

        <div class="mapa-container">
            <button id="btnAgulhaNorte" title="Recentralizar Norte">
                <div class="agulha-bussola"></div>
            </button>

            <button id="btnControleInferior" title="Orientação">
                <svg id="svgIcone" viewBox="0 0 100 100">
                    <rect width="100" height="100" rx="32" fill="#ffffff"/>
                    <circle cx="50" cy="50" r="28" fill="#e8f0fe"/>
                    <circle cx="50" cy="50" r="11" fill="#1a73e8"/>
                </svg>
            </button>

            <div id="mapa"></div>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <script>
        const btnIniciar = document.getElementById('btnIniciar');
        const btnControleInferior = document.getElementById('btnControleInferior');
        const btnAgulhaNorte = document.getElementById('btnAgulhaNorte');
        const svgIcone = document.getElementById('svgIcone');
        
        const statusDiv = document.getElementById('status');
        const ruaSpan = document.getElementById('rua');
        const bairroSpan = document.getElementById('bairro');

        let ultimaRuaFalada = "";
        let watchId = null;
        let latAtual = -3.6895, lonAtual = -40.3490; // Sobral
        
        let map = null;
        let marker = null;
        
        let modoAtual = "BUSSOLA_DESATIVADA"; 
        let autoCentralizar = true;
        let travaMovimentoAutomatica = false;

        // VARIÁVEIS DO FILTRO DA BÚSSOLA ORIGINAL
        let anguloFiltrado = 0; 
        const fatorSuavizacao = 0.02; 
        const zonaMortaGraus = 1.0; 

        // SVGs RECONSTRUÍDOS EXATAMENTE IGUAIS ÀS SUAS IMAGENS
        const svgAlvoDesativado = `<rect width="100" height="100" rx="32" fill="#ffffff"/><circle cx="50" cy="50" r="28" fill="#e8f0fe"/><circle cx="50" cy="50" r="11" fill="#1a73e8"/>`;
        const svgAlvoAtivado = `<rect width="100" height="100" rx="32" fill="#ffffff"/><circle cx="50" cy="50" r="24" fill="none" stroke="#1c2b2d" stroke-width="6.5"/><path d="M50 34 L63 50 L50 66 L37 50 Z" fill="#1c2b2d"/><circle cx="50" cy="50" r="3.5" fill="#ffffff"/>`;
        const svgNavegacaoAtiva = `<rect width="100" height="100" rx="32" fill="#9ad4e6"/><circle cx="50" cy="50" r="24" fill="none" stroke="#0e1e24" stroke-width="6.5"/><path d="M50 34 L63 50 L50 66 L37 50 Z" fill="#0e1e24"/><circle cx="50" cy="50" r="3.5" fill="#9ad4e6"/>`;

        const estiloCyclOSM = {
            version: 8,
            sources: { 'cyclosm-tiles': { type: 'raster', tiles: ['https://a.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png'], tileSize: 256 } },
            layers: [{ id: 'cyclosm-layer', type: 'raster', source: 'cyclosm-tiles' }]
        };

        function inicializarMapa() {
            if (map !== null) return;

            map = new maplibregl.Map({
                container: 'mapa',
                style: estiloCyclOSM,
                center: [lonAtual, latAtual],
                zoom: 15,
                pitch: 0,
                bearing: 0
            });

            marker = new maplibregl.Marker().setLngLat([lonAtual, latAtual]).addTo(map);

            const dispararModoAlvoPorGesto = () => {
                if (travaMovimentoAutomatica) return;
                
                if (modoAtual !== "MODO_ALVO") {
                    modoAtual = "MODO_ALVO";
                    autoCentralizar = false;
                    svgIcone.innerHTML = svgAlvoDesativado;
                }
            };

            map.on('dragstart', dispararModoAlvoPorGesto);
            map.on('zoomstart', dispararModoAlvoPorGesto);

            map.on('rotate', gerenciarAgulha);
            map.on('pitch', gerenciarAgulha);
        }

        function gerenciarAgulha() {
            if (!map) return;
            const angulo = map.getBearing();
            const inclinacao = map.getPitch();

            if (Math.abs(angulo) > 1 || inclinacao > 1) {
                btnAgulhaNorte.classList.add('visivel');
                btnAgulhaNorte.style.transform = `rotate(${-angulo}deg)`;
            } else {
                btnAgulhaNorte.classList.remove('visivel');
            }
        }

        btnControleInferior.addEventListener('click', () => {
            if (!map) return;

            if (modoAtual === "MODO_ALVO") {
                modoAtual = "BUSSOLA_DESATIVADA";
                autoCentralizar = true;
                travaMovimentoAutomatica = true;
                
                svgIcone.innerHTML = svgAlvoAtivado;

                map.flyTo({
                    center: [lonAtual, latAtual],
                    zoom: 15,
                    pitch: 0,
                    bearing: 0,
                    essential: true
                });
                
                map.once('moveend', () => { travaMovimentoAutomatica = false; });

            } else if (modoAtual === "BUSSOLA_DESATIVADA") {
                modoAtual = "BUSSOLA_ATIVADA";
                autoCentralizar = true;
                travaMovimentoAutomatica = true;
                
                svgIcone.innerHTML = svgNavegacaoAtiva;
                anguloFiltrado = -map.getBearing();

                map.flyTo({
                    center: [lonAtual, latAtual],
                    zoom: 17.5,
                    pitch: 55,
                    essential: true
                });
                
                map.once('moveend', () => { travaMovimentoAutomatica = false; });

            } else if (modoAtual === "BUSSOLA_ATIVADA") {
                modoAtual = "BUSSOLA_DESATIVADA";
                autoCentralizar = true;
                travaMovimentoAutomatica = true;
                
                svgIcone.innerHTML = svgAlvoAtivado;

                map.flyTo({
                    center: [lonAtual, latAtual],
                    zoom: 15,
                    pitch: 0,
                    bearing: 0,
                    essential: true
                });
                
                map.once('moveend', () => { travaMovimentoAutomatica = false; });
            }
        });

        btnAgulhaNorte.addEventListener('click', () => {
            if (!map) return;
            
            if (modoAtual === "BUSSOLA_ATIVADA") {
                modoAtual = "BUSSOLA_DESATIVADA";
                svgIcone.innerHTML = svgAlvoAtivado;
            }

            travaMovimentoAutomatica = true;
            map.easeTo({
                bearing: 0,
                pitch: 0,
                duration: 500
            });
            map.once('moveend', () => { travaMovimentoAutomatica = false; });
        });

        // ====== LÓGICA DE SENSORES ORIGINAL RESTAURADA ======
        let anguloMapaAtual = 0;
        let bussolaJanela = 0;
        let b_PrimeiraLeitura = true;
        let ultimoTimestamp = performance.now();

        window.addEventListener('deviceorientationabsolute', (evento) => {
            let azimuteBruto = evento.webkitCompassHeading || (360 - evento.alpha);
            if (azimuteBruto !== undefined && azimuteBruto !== null) {
                if (b_PrimeiraLeitura) {
                    anguloMapaAtual = azimuteBruto;
                    b_PrimeiraLeitura = false;
                }
                bussolaJanela = azimuteBruto;
            }
        }, true);

        function iniciarGiroscopioNativo() {
            if ('Sensor' in window && 'Gyroscope' in window) {
                try {
                    const giroscopio = new Gyroscope({ frequency: 60 });
                    
                    giroscopio.addEventListener('reading', () => {
                        if (!map || modoAtual !== "BUSSOLA_ATIVADA" || !autoCentralizar || travaMovimentoAutomatica) return;

                        const agora = performance.now();
                        const dt = (agora - ultimoTimestamp) / 1000;
                        ultimoTimestamp = agora;

                        if (dt > 0.1) return; 

                        let velocidadeGraus = giroscopio.z * (180 / Math.PI);

                        if (Math.abs(velocidadeGraus) < 0.1) {
                            velocidadeGraus = 0;
                        }

                        let anguloGiroscopio = anguloMapaAtual - (velocidadeGraus * dt);
                        
                        let diferencaBussola = bussolaJanela - anguloGiroscopio;
                        if (diferencaBussola > 180) diferencaBussola -= 360;
                        if (diferencaBussola < -180) diferencaBussola += 360;

                        anguloMapaAtual = anguloGiroscopio + 0.04 * diferencaBussola;
                        anguloMapaAtual = (anguloMapaAtual + 360) % 360;

                        map.setBearing(anguloMapaAtual);
                    });

                    giroscopio.addEventListener('error', (event) => {
                        configurarFallbackAltaFrequencia();
                    });

                    giroscopio.start();
                } catch (erro) {
                    configurarFallbackAltaFrequencia();
                }
            } else {
                configurarFallbackAltaFrequencia();
            }
        }

        function configurarFallbackAltaFrequencia() {
            window.removeEventListener('deviceorientation', tratarFallbackOrientacao, true);
            window.addEventListener('deviceorientation', tratarFallbackOrientacao, true);
        }

        function tratarFallbackOrientacao(evento) {
            if (!map || modoAtual !== "BUSSOLA_ATIVADA" || !autoCentralizar || travaMovimentoAutomatica) return;

            let azimuteBruto = evento.webkitCompassHeading || (360 - evento.alpha);
            if (!azimuteBruto) return;

            let diferenca = azimuteBruto - anguloMapaAtual;
            if (diferenca > 180) anguloMapaAtual += 360;
            else if (diferenca < -180) anguloMapaAtual -= 360;

            let deltaAbsoluto = Math.abs(azimuteBruto - anguloMapaAtual);
            let kDinamico = deltaAbsoluto > 8 ? 0.20 : 0.02;

            anguloMapaAtual = anguloMapaAtual + kDinamico * (azimuteBruto - anguloMapaAtual);
            anguloMapaAtual = (anguloMapaAtual + 360) % 360;

            map.easeTo({
                bearing: anguloMapaAtual,
                duration: 50,
                easing: (t) => t
            });
        }

        iniciarGiroscopioNativo();

        // GPS MONITORAMENTO
        btnIniciar.addEventListener('click', () => {
            if (watchId === null) {
                inicializarMapa();
                iniciarMonitoramento();
            } else {
                pararMonitoramento();
            }
        });

        function iniciarMonitoramento() {
            if (!("geolocation" in navigator)) { return alert("GPS indisponível."); }
            statusDiv.innerText = "Status: Conectando...";
            btnIniciar.innerText = "Parar Rastreamento";
            btnIniciar.style.backgroundColor = "#dc3545";

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(e => console.log(e));
            }

            watchId = navigator.geolocation.watchPosition(posicionarSucesso, posicionarErro, {
                enableHighAccuracy: true, maximumAge: 0, timeout: 10000
            });
        }

        function pararMonitoramento() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                statusDiv.innerText = "Status: Parado";
                btnIniciar.innerText = "Iniciar Navegação";
                btnIniciar.style.backgroundColor = "#28a745";
            }
        }

        async function posicionarSucesso(posicao) {
            latAtual = posicao.coords.latitude;
            lonAtual = posicao.coords.longitude;
            statusDiv.innerText = `Status: Conectado (${latAtual.toFixed(4)}, ${lonAtual.toFixed(4)})`;

            if (marker) marker.setLngLat([lonAtual, latAtual]);

            if (map && autoCentralizar && !travaMovimentoAutomatica) {
                map.easeTo({
                    center: [lonAtual, latAtual],
                    duration: 500
                });
            }

            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latAtual}&lon=${lonAtual}&zoom=18&addressdetails=1`;
                const resposta = await fetch(url, { headers: { 'User-Agent': 'IdentificadorDeRuasApp/1.0' } });
                const dados = await resposta.json();

                if (dados && dados.address) {
                    const ruaAtual = dados.address.road || dados.address.pedestrian || "Via urbana";
                    const bairroAtual = dados.address.suburb || "Sobral";

                    ruaSpan.innerText = ruaAtual;
                    bairroSpan.innerText = bairroAtual;

                    if (ruaAtual !== ultimaRuaFalada) {
                        falarTexto(`Você está na rua: ${ruaAtual}`);
                        ultimaRuaFalada = ruaAtual;
                    }
                }
            } catch (e) {}
        }

        function posicionarErro(e) { statusDiv.innerText = "Status: Sem sinal GPS"; }
        function falarTexto(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'pt-BR'; m.rate = 1.1; window.speechSynthesis.speak(m); }
    </script>
</body>
</html>
